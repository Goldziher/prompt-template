# Generated by scripts/migrate_to_poly.py from .pre-commit-config.yaml + tool configs. Review before committing.

[defaults]
line_length = 120
line_ending = "lf"
final_newline = true
trim_trailing_whitespace = true

[discovery]
exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
]

[per-file-ignores]
"tests/**/*.*" = ["ARG001", "D", "N815", "PGH003", "PLR2004", "PT006", "PT007", "PT013", "RUF012", "S"]

[lint.python.ruff]
target_version = "py39"
src = ["src", "tests"]
pydocstyle_convention = "google"
known_first_party = ["src", "tests"]
line_length = 120
select = ["ALL"]
ignore = ["ANN401", "COM812", "D100", "D104", "D107", "D205", "E501", "EM", "FBT", "ISC001", "PLR0911", "TRY"]

[hooks]
stages = ["pre-commit"]

[hooks.builtin]
polylint = { exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
] }
polyfmt = { exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
] }
file_safety = { exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
] }

# --- catalog tools (standalone binaries, PATH-probed) ---
[tools.pyrefly]
enabled = true

